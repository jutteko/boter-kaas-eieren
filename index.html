<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boter-Kaas-Eieren</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 class="title">Boter - Kaas - Eieren</h1>
      </div>
      <div class="container-boven-bord">
        <div class="container-namen">
          <form class="frm-names">
            <input
              type="text"
              name="player1"
              id="player1"
              placeholder="player1"
              required
            />
            <p class="versus">X vs O</p>
            <input
              type="text"
              name="player2"
              id="player2"
              placeholder="player2"
              required
            />
            <input type="submit" value="Play" id="btn-play" />
            <button type="button" id="btn-reset">Reset</button>
          </form>
        </div>
      </div>
      <div class="container-bord">
        <div class="bord"></div>
      </div>
      <div class="container-onder-bord"><h2>Congratulations! ... won!</h2></div>
    </div>
  </body>
</html>
